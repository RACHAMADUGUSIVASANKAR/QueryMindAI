version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: querymind-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=querymindDB
    restart: unless-stopped

  server:
    build:
      context: ../server
      dockerfile: ../docker/Dockerfile
    container_name: querymind-server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/querymindDB
      - PORT=5000
      - AI_SERVICE_URL=http://ai-service:8000
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
      - ai-service
    restart: unless-stopped

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: querymind-ai
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/querymindDB
    restart: unless-stopped

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: querymind-client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongodb_data:
